<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valeris Central</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020817;--sidebar:#0a1628;--surface:#0f1d32;--border:rgba(148,163,184,.12);--primary:#10b981;--primary10:rgba(16,185,129,.1);--yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;--card:#0c1a2e}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
/* Sidebar */
.sidebar{width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:24px 20px;display:flex;align-items:center;gap:12px}
.sidebar-logo{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;background:rgba(16,185,129,.08)}
.sidebar-logo svg{width:22px;height:22px;color:var(--primary)}
.sidebar-title{font-weight:700;font-size:16px;letter-spacing:.3px}
.sidebar-subtitle{font-size:11px;color:var(--muted);margin-top:1px}
.sidebar-section{padding:0 16px;margin-bottom:6px;margin-top:20px;font-size:10px;font-weight:600;color:rgba(148,163,184,.5);letter-spacing:1.5px;text-transform:uppercase}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;text-decoration:none;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.nav-item.active{background:var(--primary10);color:var(--primary);font-weight:600}
.nav-item svg{width:18px;height:18px;opacity:.7}
.sidebar-footer{margin-top:auto;padding:20px;border-top:1px solid var(--border)}
.sidebar-footer .nav-item{color:var(--muted);gap:10px}
.sidebar-version{text-align:center;font-size:10px;color:rgba(148,163,184,.35);margin-top:16px;font-family:monospace}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;display:flex;align-items:center;padding:0 24px;flex-shrink:0;gap:12px}
.topbar-left{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);min-width:0}
.topbar-dot{width:7px;height:7px;border-radius:50%;background:var(--primary);flex-shrink:0}
.topbar-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.view-switcher{margin-left:auto;display:none;background:var(--sidebar);border:1px solid var(--border);border-radius:999px;padding:4px;flex-shrink:0}
.view-btn{padding:8px 14px;border-radius:999px;border:none;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
.view-btn:hover{color:var(--text)}
.view-btn.active{background:var(--primary);color:#000;font-weight:600}
.view-btn svg{width:15px;height:15px;flex-shrink:0}
.view-btn .btn-label{display:inline}
/* Preview */
.preview{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;overflow:auto;perspective:1200px}
.frame-component{width:100%;height:100%;max-width:960px;border:none;border-radius:0;background:transparent;transition:all 0.5s cubic-bezier(0.4, 0, 0.2, 1)}

/* 3D-ish Notebook Frame (Flat Version for better UX) */
.frame-desktop{width:900px;height:580px;position:relative;transition:all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)}
.frame-desktop::before{content:'';position:absolute;inset:-12px;background:#252525;border-radius:20px;box-shadow:0 40px 80px -12px rgba(0,0,0,0.7);z-index:0;border:1px solid #444}
.frame-desktop .bezel{position:absolute;inset:6px;background:#000;border-radius:12px;overflow:hidden;z-index:1;padding:32px 12px 12px 12px;border:1px solid #333}
.frame-desktop .bezel::before{content:'';position:absolute;top:12px;left:50%;transform:translateX(-50%);width:6px;height:6px;background:#222;border-radius:50%;border:1px solid #333}
.frame-desktop .laptop-base{position:absolute;bottom:-30px;left:-40px;right:-40px;height:12px;background:#1a1a1a;border-radius:0 0 40px 40px;box-shadow:0 10px 20px rgba(0,0,0,0.5);z-index:-1}

/* 3D-ish Mobile Frame (Flat Version) */
.frame-mobile{width:360px;height:740px;position:relative;transition:all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);flex-shrink:0}
.frame-mobile::before{content:'';position:absolute;inset:-10px;background:#1a1a1a;border-radius:50px;box-shadow:0 30px 60px -12px rgba(0,0,0,0.6);z-index:0;border:1px solid #333}
.frame-mobile .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:160px;height:28px;background:#000;border-bottom-left-radius:18px;border-bottom-right-radius:18px;z-index:10}
.frame-mobile .screen{position:absolute;inset:5px;background:#000;border-radius:45px;overflow:hidden;z-index:1;border:1px solid #222}

.frame-desktop iframe,.frame-mobile .screen iframe,.frame-component iframe{width:100%;height:100%;border:none;background:#0A111F}

/* Responsive: hide label on narrow viewports */
@media(max-width:720px){.view-btn .btn-label{display:none}.view-btn{padding:8px 10px}.sidebar{width:200px}.sidebar-title{font-size:14px}}
/* Embed mode for external project integration */
body.embed-mode .sidebar,
body.embed-mode .topbar{display:none}
body.embed-mode .main{width:100%;height:100vh}
body.embed-mode .preview{padding:0}
body.embed-mode #frame.frame-component{max-width:none;height:100%}
</style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        <div>
            <div class="sidebar-title">Valeris</div>
            <div class="sidebar-subtitle">Central de API</div>
        </div>
    </div>
    <div class="sidebar-section">Microserviços</div>
    <nav class="sidebar-nav">
        <button class="nav-item active" onclick="nav('assinatura',this)">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            Assinatura
        </button>
        <button class="nav-item" onclick="nav('documento',this)">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Documento
        </button>
        <button class="nav-item" onclick="nav('selfie',this)">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            Selfie
        </button>
        <button class="nav-item" onclick="nav('selfie_doc',this)">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Selfie + Doc
        </button>
    </nav>
    <div class="sidebar-section">Gerenciamento</div>
    <nav class="sidebar-nav">
        <button class="nav-item" onclick="nav('api_keys',this)">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
            API Keys
        </button>
        <button class="nav-item" onclick="nav('downloads',this)">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Downloads
        </button>
        <button class="nav-item" onclick="nav('docs',this)">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            Documentação
        </button>
    </nav>
</aside>

<div class="main">
    <header class="topbar">
        <div class="topbar-left">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            <div class="topbar-dot"></div>
            <span id="topTitle">Assinatura</span>
        </div>
        <div class="view-switcher" id="viewSwitcher">
            <button class="view-btn active" onclick="setView('component',this)">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
                <span class="btn-label">Componente</span>
            </button>
            <button class="view-btn" id="btnDesktop" onclick="setView('desktop',this)">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                <span class="btn-label">Desktop</span>
            </button>
            <button class="view-btn" id="btnMobile" onclick="setView('mobile',this)">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                <span class="btn-label">Mobile</span>
            </button>
        </div>

    </header>
    <div class="preview" id="preview">
        <div id="frame" class="frame-component">
            <iframe id="iframe" src="components/assinatura.html" allow="camera;microphone;geolocation"></iframe>
        </div>
    </div>
</div>

<script>
const queryParams = new URLSearchParams(window.location.search);
const embedService = queryParams.get('service');
const embedToken = queryParams.get('token');
const embedApiUrl = queryParams.get('apiUrl');
const services = ['assinatura', 'documento', 'selfie', 'selfie_doc'];

function normalizeService(value) {
    if (!value) return null;
    if (value === 'selfie-documento') return 'selfie_doc';
    return value;
}

function buildIframeSrc(page) {
    const normalized = normalizeService(page);
    const params = new URLSearchParams();
    if (embedToken) params.set('token', embedToken);
    if (embedApiUrl) params.set('apiUrl', embedApiUrl);
    const qs = params.toString();
    return 'components/' + normalized + '.html' + (qs ? '?' + qs : '');
}

function nav(page, el) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    
    const topTitle = document.getElementById('topTitle');
    topTitle.textContent = el.textContent.trim();
    
    const switcher = document.getElementById('viewSwitcher');
    
    // Update iframe src
    const newSrc = buildIframeSrc(page);
    
    if (!services.includes(page)) {
        switcher.style.display = 'none';
        // When in management, always use full component view
        const frame = document.getElementById('frame');
        frame.className = 'frame-component';
        frame.innerHTML = '<iframe id="iframe" src="' + newSrc + '" allow="camera;microphone;geolocation"></iframe>';
    } else {
        switcher.style.display = 'flex';
        // Current view (desktop/mobile/component) stays, just update src
        const existingIframe = document.getElementById('iframe');
        if (existingIframe) {
            existingIframe.src = newSrc;
        } else {
            // Fallback if iframe was somehow removed
             setView('component', document.querySelector('.view-btn'));
             document.getElementById('iframe').src = newSrc;
        }
    }
}

// Initial state
window.onload = () => {
    const initialService = normalizeService(embedService);
    if (initialService && services.includes(initialService)) {
        document.body.classList.add('embed-mode');
        const frame = document.getElementById('frame');
        frame.className = 'frame-component';
        frame.innerHTML = '<iframe id="iframe" src="' + buildIframeSrc(initialService) + '" allow="camera;microphone;geolocation"></iframe>';
        return;
    }
    document.getElementById('viewSwitcher').style.display = 'flex';
};
function setView(type, el) {
    if (!el) return;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    const frame = document.getElementById('frame');
    const currentSrc = document.getElementById('iframe').src;
    
    if (type === 'desktop') {
        frame.className = 'frame-desktop';
        frame.innerHTML = '<div class="bezel"><iframe id="iframe" src="' + currentSrc + '" allow="camera;microphone;geolocation"></iframe></div><div class="laptop-base"></div>';
    } else if (type === 'mobile') {
        frame.className = 'frame-mobile';
        frame.innerHTML = '<div class="notch"></div><div class="screen"><iframe id="iframe" src="' + currentSrc + '" allow="camera;microphone;geolocation"></iframe></div>';
    } else {
        frame.className = 'frame-component';
        frame.innerHTML = '<iframe id="iframe" src="' + currentSrc + '" allow="camera;microphone;geolocation"></iframe>';
    }
}
</script>
</body>
</html>
