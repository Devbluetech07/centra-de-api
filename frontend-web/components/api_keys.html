<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Keys</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020817;--border:rgba(148,163,184,.12);--primary:#10b981;--yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;--card:#0d1a2d}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:48px 40px;min-height:100vh}
h1{font-size:30px;font-weight:700;margin-bottom:6px}h1 span{color:var(--yellow)}
.subtitle{color:var(--muted);font-size:15px;margin-bottom:32px}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.btn{padding:12px 20px;border-radius:10px;border:none;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#000}.btn-primary:hover{background:#0ea472}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:14px 20px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:14px 20px;font-size:14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.key-name{font-weight:600}
.key-prefix{font-family:monospace;font-size:13px;color:var(--muted);background:rgba(148,163,184,.08);padding:4px 10px;border-radius:6px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-active{background:rgba(16,185,129,.12);color:var(--primary)}
.badge-inactive{background:rgba(148,163,184,.1);color:var(--muted)}
.badge-dot{width:6px;height:6px;border-radius:50%}
.badge-active .badge-dot{background:var(--primary)}
.badge-inactive .badge-dot{background:var(--muted)}
.actions-cell{display:flex;gap:6px}
.action-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.action-btn:hover{background:rgba(255,255,255,.06);color:var(--text)}
.action-btn svg{width:14px;height:14px}
.empty{text-align:center;padding:60px;color:var(--muted)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:#0f1d32;border:1px solid var(--border);border-radius:16px;padding:32px;width:420px;max-width:90%}
.modal h3{font-size:18px;font-weight:700;margin-bottom:6px}
.modal p{color:var(--muted);font-size:13px;margin-bottom:24px}
.modal label{display:block;font-size:13px;font-weight:600;margin-bottom:8px;color:var(--muted)}
.modal input,.modal select{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:rgba(10,20,40,.6);color:var(--text);font-size:14px;font-family:inherit;margin-bottom:16px;outline:none}
.modal input:focus,.modal select:focus{border-color:var(--primary)}
.modal-actions{display:flex;gap:12px;margin-top:8px}
.modal-actions .btn{flex:1;justify-content:center}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-ghost:hover{background:rgba(255,255,255,.04)}
.token-box{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:rgba(10,20,40,.6);color:var(--text);font-size:13px;font-family:monospace;margin:12px 0}
</style>
</head>
<body>
<h1>Chaves de <span>API</span></h1>
<p class="subtitle">Gerencie suas chaves de autenticação</p>

<div class="header-row">
    <div style="color:var(--muted);font-size:13px" id="countLabel">2 chaves ativas</div>
    <button class="btn btn-primary" onclick="openModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Nova Chave
    </button>
</div>

<div class="table-card">
    <table>
        <thead>
            <tr><th>Nome</th><th>Chave</th><th>Escopo</th><th>Status</th><th>Criada em</th><th></th></tr>
        </thead>
        <tbody id="keysBody"></tbody>
    </table>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <h3>Criar Nova Chave</h3>
        <p>Preencha os dados para gerar uma nova chave de API</p>
        <label>Nome da Chave</label>
        <input placeholder="Ex: Produção" id="keyName">
        <label>Escopo</label>
        <select id="keyScope"><option>Completo</option><option>Leitura</option><option>Escrita</option></select>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="createKey()">Criar Chave</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="tokenModal">
    <div class="modal">
        <h3>Chave criada com sucesso</h3>
        <p>Copie e guarde esta chave agora. Por segurança, ela é exibida completa apenas neste momento.</p>
        <input class="token-box" id="newTokenValue" readonly>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeTokenModal()">Fechar</button>
            <button class="btn btn-primary" onclick="copyNewToken()">Copiar Token</button>
        </div>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const apiUrl = params.get('apiUrl') || '/api';
function localBootstrapToken() {
    const host = (window.location.hostname || '').toLowerCase();
    if (host === 'localhost' || host === '127.0.0.1') {
        return 'vl_bootstrap_change_me_please_rotate';
    }
    return '';
}
function normalizeToken(token) {
    const raw = (token || '').trim();
    const bootstrap = localBootstrapToken();
    if (!raw) return bootstrap || '';
    if (raw === 'portal-demo' && bootstrap) return bootstrap;
    return raw;
}
const token = normalizeToken(params.get('token') || localStorage.getItem('valeris_token') || localBootstrapToken());
if (token) {
    try { localStorage.setItem('valeris_token', token); } catch (_) {}
}
const cacheKey = 'valeris_api_key_cache';
let keyCache = {};
try { keyCache = JSON.parse(localStorage.getItem(cacheKey) || '{}'); } catch (_) { keyCache = {}; }

function saveKeyCache() {
    localStorage.setItem(cacheKey, JSON.stringify(keyCache));
}

async function copyText(value) {
    if (!value) return false;
    try {
        if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(value);
            return true;
        }
    } catch (_) {}
    try {
        const tmp = document.createElement('textarea');
        tmp.value = value;
        tmp.setAttribute('readonly', '');
        tmp.style.position = 'absolute';
        tmp.style.left = '-9999px';
        document.body.appendChild(tmp);
        tmp.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(tmp);
        return !!ok;
    } catch (_) {
        return false;
    }
}

function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
}

function ensureToken() {
    if (token) return true;
    const body = document.getElementById('keysBody');
    body.innerHTML = `<tr><td class="empty" colspan="6">Defina um token de acesso na tela principal para gerenciar chaves.</td></tr>`;
    document.getElementById('countLabel').textContent = 'Token obrigatorio';
    alert('Token de acesso obrigatorio. Preencha o token no topo da tela principal.');
    return false;
}

function openModal(){
    if (!ensureToken()) return;
    document.getElementById('modal').classList.add('show')
}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function openTokenModal(value){
    document.getElementById('newTokenValue').value = value || '';
    document.getElementById('tokenModal').classList.add('show');
}
function closeTokenModal(){document.getElementById('tokenModal').classList.remove('show')}
async function copyNewToken(){
    const value = document.getElementById('newTokenValue').value;
    const copied = await copyText(value);
    if (copied) {
        alert('Token copiado!');
    } else {
        window.prompt('Copie o token abaixo:', value);
    }
}

function maskPrefix(prefix){
    const p = String(prefix || 'vl_');
    return `${p}****`;
}

function formatScope(scope){
    const s = String(scope || '').toLowerCase();
    if (s === 'leitura') return 'Leitura';
    if (s === 'escrita') return 'Escrita';
    return 'Completo';
}

function formatDate(dateISO){
    if (!dateISO) return '-';
    const d = new Date(dateISO);
    if (Number.isNaN(d.getTime())) return '-';
    return d.toLocaleDateString('pt-BR');
}

function updateCount(keys){
    const active = keys.filter(k => k.is_active).length;
    document.getElementById('countLabel').textContent = `${active} chave${active === 1 ? '' : 's'} ativa${active === 1 ? '' : 's'}`;
}

async function copyKey(id, fallbackPrefix){
    const full = keyCache[id];
    if (full) {
        const copied = await copyText(full);
        if (copied) alert('Token completo copiado.');
        else window.prompt('Copie o token abaixo:', full);
        return;
    }
    if (fallbackPrefix) {
        const copied = await copyText(fallbackPrefix);
        if (copied) alert('Apenas prefixo copiado. Crie uma nova chave para obter token completo.');
        else window.prompt('Apenas prefixo disponível:', fallbackPrefix);
        return;
    }
    alert('Token completo indisponível. Crie uma nova chave para copiar o token integral.');
}

async function setKeyActive(id, isActive){
    const actionText = isActive ? 'ativar' : 'desativar';
    if (!confirm(`Deseja ${actionText} esta chave?`)) return;
    const res = await fetch(`${apiUrl}/keys/${id}`, {
        method: 'PATCH',
        headers: authHeaders(),
        body: JSON.stringify({ is_active: isActive })
    });
    if (!res.ok) {
        const txt = await res.text();
        alert(`Falha ao ${actionText}: ${txt}`);
        return;
    }
    await loadKeys();
}

function renderKeys(keys){
    const body = document.getElementById('keysBody');
    const activeKeys = keys.filter(k => k.is_active);
    activeKeys.forEach(k => {
        if (k.id && k.key) keyCache[k.id] = k.key;
    });
    saveKeyCache();
    if (!activeKeys.length) {
        body.innerHTML = `<tr><td class="empty" colspan="6">Nenhuma chave cadastrada</td></tr>`;
        updateCount([]);
        return;
    }
    body.innerHTML = activeKeys.map(k => {
        const badge = k.is_active
            ? '<span class="badge badge-active"><span class="badge-dot"></span>Ativa</span>'
            : '<span class="badge badge-inactive"><span class="badge-dot"></span>Inativa</span>';
        const toggleTitle = k.is_active ? 'Desativar' : 'Ativar';
        const toggleIcon = k.is_active
            ? '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6M5 5l14 14"/></svg>'
            : '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
        return `<tr>
            <td class="key-name">${k.name || '-'}</td>
            <td><span class="key-prefix">${maskPrefix(k.key_prefix)}</span></td>
            <td>${formatScope(k.scope)}</td>
            <td>${badge}</td>
            <td style="color:var(--muted);font-size:13px">${formatDate(k.created_at)}</td>
            <td><div class="actions-cell">
                <button class="action-btn" title="Copiar" onclick="copyKey('${k.id}','${(k.key_prefix || '').replace(/'/g, "\\'")}')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button>
                <button class="action-btn" title="${toggleTitle}" onclick="setKeyActive('${k.id}', ${k.is_active ? 'false' : 'true'})">${toggleIcon}</button>
            </div></td>
        </tr>`;
    }).join('');
    updateCount(activeKeys);
}

async function loadKeys() {
    if (!ensureToken()) return;
    const body = document.getElementById('keysBody');
    body.innerHTML = `<tr><td class="empty" colspan="6">Carregando...</td></tr>`;
    try {
        const res = await fetch(`${apiUrl}/keys/`, { headers: authHeaders() });
        if (!res.ok) {
            const txt = await res.text();
            throw new Error(txt || `HTTP ${res.status}`);
        }
        const keys = await res.json();
        renderKeys(Array.isArray(keys) ? keys : []);
    } catch (e) {
        body.innerHTML = `<tr><td class="empty" colspan="6">Erro ao carregar chaves</td></tr>`;
        alert(`Erro ao carregar chaves: ${e.message || e}`);
    }
}

async function createKey(){
    if (!ensureToken()) return;
    const name = (document.getElementById('keyName').value || '').trim() || 'Nova Chave';
    const scope = (document.getElementById('keyScope').value || 'Completo').toLowerCase();
    const payload = { name, scope };

    try {
        const res = await fetch(`${apiUrl}/keys/`, {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify(payload)
        });
        const raw = await res.text();
        let data = {};
        try { data = raw ? JSON.parse(raw) : {}; } catch (_) {}
        if (!res.ok) {
            throw new Error((data && data.message) || raw || `HTTP ${res.status}`);
        }
        if (data.id && data.key) {
            keyCache[data.id] = data.key;
            saveKeyCache();
            openTokenModal(data.key);
        }
        closeModal();
        document.getElementById('keyName').value = '';
        await loadKeys();
    } catch (e) {
        alert(`Falha ao criar chave: ${e.message || e}`);
    }
}

loadKeys();
</script>
</body>
</html>
